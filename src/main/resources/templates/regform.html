<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>reg form</title> 
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="icon" href="/favi.png" sizes="any" type="image/png"/> 
    <style>
      body {
        min-width: 460px; 
        background: #FFDB89;
        font-family: Helvetica;
        /*overflow-x: hidden; */
      } 
      .reg { 
        width: 30%; 
        /*height: 70%; */
        background: #FFF8CC;
        color: rgba(128, 0, 0, 1); 
        font-size: 17px; 
        font-weight: bold;
        text-align: center; 
        box-shadow: 0 9px 10px rgba(0, 0, 0, 0.4); 
        border-radius: 12px; 
        padding: 20px 10px 10px 10px; 
        margin: 50px auto 0 35%; 
      } 
      .header { 
        height: 50px; 
        padding: 5px 0px 0px 0px;
      } 
      .naming-and-field { 
        display: flex;  
      }
      .naming { 
        width: 85px; 
        margin: 10px 0 0 0; 
      }
      .field { 
        width: 74%; 
        height: 30px; 
        font-size: 17px; 
        margin: 0 0 8px 0;
      }
      .download-button { 
        /*width: 250px; */ 
        height: 38px; 
        margin: 10px 0px 25px auto;       
        padding: 10px 50px;
        color: white;
        border: none;
        border-radius: 12px; 
        font-size: 18px;
        font-weight: bold;  
        background-color: #4CAF50;                
        position: relative;
        top: 0;        
        box-shadow: 0 5px 0 #2E7D32, 0 9px 10px rgba(0, 0, 0, 0.4);   
        transition: all 0.1s ease; 
      }
      .download-button:active {
        top: 5px; 
        box-shadow: 0 0 0 #2E7D32, 0 0 5px rgba(0, 0, 0, 0.4);
      }  
      .string { 
        font-size: 20px; 
        margin: 0 0 8px 0; 
      } 
      .small-string { 
        font-size: 17px; 
        margin: 0 0 2px 0; 
      } 
      .header-string { 
        font-size: 17px; 
        color: red; 
        margin: 0 0 2px 0; 
      } 

      
    </style>
  </head>

  <body> 
    <div class="reg">   
      <div class="header">
        <div class="header-string" th:if="${content != null && !#strings.isEmpty(content)}"  
             th:id="'myDiv'" th:text="${content}">    
        </div>
        <div class="string" th:unless="${content != null && !#strings.isEmpty(content)}">
          Ваши данные:
        </div>
      </div>  
       
      <form action="/olduser" method="post">        
        <div class="naming-and-field">
          <div class="naming"> Имя: </div>
          <input class="field" type="text" name="username" required > <br> <br>
        </div> 

        <div class="naming-and-field">
          <div class="naming"> Пароль: </div>
          <input class="field" type="text" name="pass" required > <br> <br>
        </div> 
        
        <button class="download-button" type="submit">
          войти
        </button> 
      </form> 

      <br>       
      <div class="small-string">
        Вы еще не зарегистрированы? 
      </div> 
      <form action="/newuser" method="post">          
        <button class="download-button" type="submit">
          зарегистрироваться
        </button> 
      </form> 

      <br>       
      <div class="small-string">
        Хотите выйти или сменить аккаунт? 
      </div> 
      <form action="/getout" method="post">          
        <button class="download-button" type="submit">
          выйти
        </button> 
      </form> 

      <br> 
      <div class="small-string"> 
        Передумали? 
      </div> 
      <form action="/index" method="get">  
        <button class="download-button" type="submit">
          вернуться на главную
        </button>  
      </form>       
    </div> 
  </body> 
</html>
